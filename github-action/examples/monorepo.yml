# Monorepo DevSentinel Analysis
# Analyzes multiple projects in parallel

name: Monorepo Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-frontend:
    name: Analyze Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run DevSentinel Analysis - Frontend
        id: frontend
        uses: devsentinel/github-action@v1
        with:
          api-key: ${{ secrets.DEVSENTINEL_API_KEY }}
          project-id: ${{ secrets.FRONTEND_PROJECT_ID }}
          threshold: 85
      
      - name: Output Frontend Results
        run: |
          echo "Frontend Health Score: ${{ steps.frontend.outputs.health-score }}/100"
          echo "Status: ${{ steps.frontend.outputs.status }}"
  
  analyze-backend:
    name: Analyze Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run DevSentinel Analysis - Backend
        id: backend
        uses: devsentinel/github-action@v1
        with:
          api-key: ${{ secrets.DEVSENTINEL_API_KEY }}
          project-id: ${{ secrets.BACKEND_PROJECT_ID }}
          threshold: 90
      
      - name: Output Backend Results
        run: |
          echo "Backend Health Score: ${{ steps.backend.outputs.health-score }}/100"
          echo "Status: ${{ steps.backend.outputs.status }}"
  
  analyze-mobile:
    name: Analyze Mobile
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run DevSentinel Analysis - Mobile
        id: mobile
        uses: devsentinel/github-action@v1
        with:
          api-key: ${{ secrets.DEVSENTINEL_API_KEY }}
          project-id: ${{ secrets.MOBILE_PROJECT_ID }}
          threshold: 80
      
      - name: Output Mobile Results
        run: |
          echo "Mobile Health Score: ${{ steps.mobile.outputs.health-score }}/100"
          echo "Status: ${{ steps.mobile.outputs.status }}"
  
  summary:
    name: Analysis Summary
    runs-on: ubuntu-latest
    needs: [analyze-frontend, analyze-backend, analyze-mobile]
    if: always()
    
    steps:
      - name: Create Summary Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 📊 Monorepo Analysis Summary\n\n` +
                        `| Project | Health Score | Status |\n` +
                        `|---------|--------------|--------|\n` +
                        `| Frontend | ${{ needs.analyze-frontend.outputs.health-score || 'N/A' }}/100 | ${{ needs.analyze-frontend.result }} |\n` +
                        `| Backend | ${{ needs.analyze-backend.outputs.health-score || 'N/A' }}/100 | ${{ needs.analyze-backend.result }} |\n` +
                        `| Mobile | ${{ needs.analyze-mobile.outputs.health-score || 'N/A' }}/100 | ${{ needs.analyze-mobile.result }} |\n\n` +
                        `[View Dashboard](https://devsentinel.com/dashboard)`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
